name: ANSAC
version: ${version}
main: dev.ztros.ansac.ANSACPlugin
description: 'Advanced Network Security Anti-Cheat for Folia with built-in authentication and dual-model AI'
author: ZTROS-Team
website: https://github.com/ABI-ZTROS/ANSAC-Java-Server-Core
folia-supported: true
api-version: '1.21'

commands:
  ansac:
    description: ANSAC Anti-Cheat main command
    usage: /ansac [help|reload|status|info|ban|kick|unban|banlist|trust|untrust|trustlist|baseline|inference|sampling|mode|watch|mark|unmark|marklist]
    aliases: [ac]
  login:
    description: Login to ANSAC authentication system
    usage: /login <password>
    aliases: [l]
  register:
    description: Register for ANSAC authentication
    usage: /register <password> <confirmPassword>
    aliases: [reg]
  changepassword:
    description: Change your password
    usage: /<command> <old> <new>
    aliases: [changepwd]
  logout:
    description: Logout from your account
    usage: /<command>
  report:
    description: Report a player for suspected cheating
    usage: /report <player> [reason]

permissions:
  ansac.bypass:
    description: Bypass all ANSAC checks
    default: op
  ansac.admin:
    description: Access to ANSAC admin commands
    default: op
  ansac.alerts:
    description: Receive ANSAC alert notifications
    default: op
  ansac.command.reload:
    description: Reload ANSAC configuration
    default: op
  ansac.command.status:
    description: View ANSAC status
    default: op
  ansac.command.trust:
    description: Trust/untrust players for physics learning
    default: op
  ansac.command.baseline:
    description: Manage physics baseline model
    default: op
  ansac.command.inference:
    description: View physics inference status and player data
    default: op
  ansac.command.mark:
    description: Mark/unmark players as high-risk (confirmed cheaters for B-model training)
    default: op

