# ==========================================
# ANSAC - 高级网络安全反作弊系统
# 配置文件
# ==========================================
#
# 物理参考数据（Minecraft 1.21.x）:
#   行走速度: 0.21585 格/刻 (4.317 m/s)
#   疾跑速度: 0.2806 格/刻 (5.612 m/s)
#   疾跑跳跃: 0.35635 格/刻 (7.127 m/s)
#   跳跃初速: 0.42 格/刻 (Y轴)
#   重力: 每刻先减 0.08, 再乘 0.98
#   终端速度: 3.92 格/刻 (78.4 m/s)
#   冰面倍率: 9.27x | 蓝冰倍率: 16.85x
#   速度药水: 基础速度 * (1 + 0.2 * 等级)
#   跳跃提升: 初速 + 0.1 * 等级
#   灵魂疾行: 疾跑 ~0.394 + 0.03 * (等级-1) 格/刻
#   海豚恩典: 水中速度 * 5.0
#   鞘翅滑翔: 1.5 格/刻 (0度俯角, 30 m/s)
#   鞘翅烟花: 1.675 格/刻 (33.5 m/s)
#   鞘翅最小: 0.36 格/刻 (30度上仰, 7.2 m/s)
#   鞘翅摩擦: 0.99 (水平)
#   风弹击退: ~6格高度, 2.5格水平
#   正常人类CPS极限: ~16 CPS (持续稳定)
#   GrimAC Timer drift: 120ms

settings:
  # 启用调试日志
  debug: false

  # 启用管理员预警消息
  alerts-enabled: true

  # 启用处罚（踢出/封禁）
  punishments-enabled: true

  # 违规等级衰减间隔（秒）
  violation-decay-interval: 30

  # 违规等级衰减因子 (0.0 - 1.0, 越高衰减越慢)
  violation-decay-factor: 0.9

  # 延迟检测间隔（秒）
  ping-check-interval: 5

# ==========================================
# 物理推理引擎配置
# ==========================================
physics-inference:
  # 是否启用物理推理引擎
  enabled: true

  # 是否优先使用推理结果（启用时检查会优先使用 processWithInference）
  prefer-inference: true

  # 是否启用自动学习（受信任玩家的数据自动喂入基准模型）
  auto-learn: true

  # 学习率系数（EMA 更新灵敏度，越大对最新数据响应越快）
  learning-rate: 0.1

  # 推理结果对检查决策的影响权重
  influence-weight: 1.0

  # 触发学习所需的最小采样数
  min-samples: 10

  # 校准阈值（总采样数达到此值视为初步校准完成）
  calibration-threshold: 1000

  # 偏差阈值（学习值与理论值偏差超过此比例时触发修正计数）
  deviation-threshold: 0.15

  # 自动保存间隔（分钟）
  save-interval-minutes: 30

  # MLP 行为分析模型
  mlp-enabled: true
  mlp-sampling-target: 5000

  # ========================================
  # 神经网络详细参数
  # 注意：输入维度由特征提取器决定，不可配置
  #   MovementMLP 输入 = 84 (自动)
  #   CombatMLP   输入 = 14 (自动)
  #   CausalFusion 输入 = 8 (自动)
  # 修改隐藏层维度后旧模型文件会自动检测并重建
  # ========================================
  mlp-network:
    # MovementMLP: 移动行为正常度网络
    movement:
      hidden1: 128        # 第一隐藏层神经元数 (建议 64~256, 范围 4~512)
      hidden2: 64         # 第二隐藏层神经元数 (建议 32~128, 范围 4~512)
      learning-rate: 0.01 # 学习率 (建议 0.001~0.05)

    # CombatMLP: 战斗行为正常度网络
    combat:
      hidden1: 32
      hidden2: 16
      learning-rate: 0.01

    # CausalFusion: 因果融合决策网络
    # 输入: movementScore, combatScore, ruleScore, 环境解释力, 速度/预期比, 击退力度, 顶格跳, 冲击事件
    fusion:
      hidden1: 24         # 隐藏层神经元数 (建议 8~32, 范围 4~64)
      learning-rate: 0.01

    # 威胁模型网络参数 (B模型, 从确认作弊者训练)
    # 与A模型结构相同, 但训练标签相反: target=1.0表示作弊
    threat-movement:
      hidden1: 128
      hidden2: 64
      learning-rate: 0.01
    threat-combat:
      hidden1: 32
      hidden2: 16
      learning-rate: 0.01
    threat-fusion:
      hidden1: 24
      learning-rate: 0.01

    # 训练安全参数（所有网络共享）
    grad-clip: 5.0        # 梯度裁剪阈值 (防止梯度爆炸)
    weight-clip: 50.0     # 权重裁剪阈值 (防止极端权重)
    train-epochs: 200      # 每轮采样训练迭代次数
    model-punish-vl: 20    # 模型处罚所需累计VL
    anomaly-threshold: 0.70 # 异常判定阈值 (0~1, 越高越宽松)

  # ========================================
  # 双模型 AB 架构配置
  # ========================================
  # A模型: 从受信任玩家训练, 学习"正常行为"分布 (target=1.0=正常)
  # B模型: 从确认作弊者训练, 学习"作弊行为"分布 (target=1.0=作弊)
  # 两种模型同时训练和使用, ModelSelector智能决策定罪策略
  # - 双模型一致 (A异常+B匹配) → 最高置信度定罪
  # - 仅B匹配 → 威胁模式命中
  # - 仅A异常 → 行为异常但无已知作弊模式
  # 高危玩家(已确认作弊者)的B模型权重自动提升
  dual-model:
    enabled: true

    # A模型(正常)在综合评估中的权重
    model-a-weight: 0.4

    # B模型(威胁)在综合评估中的权重
    model-b-weight: 0.4

    # 规则层在综合评估中的权重
    rule-weight: 0.2

    # 双模型确认阈值 (A异常度和B匹配度都超过此值时为最高置信度)
    dual-confirm-threshold: 0.6

    # 单模型定罪阈值 (综合置信度超过此值才建议定罪)
    single-convict-threshold: 0.75

    # 高危玩家B模型权重加成倍数 (已确认作弊者用B模型推理更精准)
    highrisk-b-weight-boost: 1.5

    # 威胁模型采样目标 (从高危玩家收集多少样本后触发批量训练)
    threat-sampling-target: 2000

    # 模型文件大小上限(MB)，超过则跳过保存
    # 神经网络权重以double(8字节)存储，大小取决于隐藏层维度
    # MovementMLP(84→56→32→1): ~38KB
    # CombatMLP(14→16→8→1): ~3KB
    # CausalFusion(8→12→1): ~1KB
    # 默认50MB足够，可按需调整
    max-model-size-mb: 50

    # 信任/危险玩家无条件信任模式
    # 标记为合法的玩家(isTrusted): 无条件信任A模型(正常模型)输出为合法
    #   跳过所有处罚和异常判定，但仍参与A模型训练
    # 标记为危险的玩家(isHighRisk): 无条件信任B模型(威胁模型)输出为作弊
    #   跳过A模型评估，threatFusionScore直接作为定罪依据
    trusted-player-unconditional: true
    dangerous-player-unconditional: true

# ==========================================
# 处罚配置
# ==========================================
# 参考 AdvancedBan 设计模式，使用 MiniMessage 富文本格式
# 可用变量: %player%, %uuid%, %reason%, %check%, %vl%, %operator%, %date%, %duration%, %expiry%, %time_remaining%

punishments:
  # 自动封禁开关（检测达到 max-vl 时，若 punishment-type 为 ban 则执行封禁）
  auto-ban-enabled: false

  # 自动封禁时长（分钟），-1 = 永久
  auto-ban-duration: 1440

  # 封禁消息模板（MiniMessage 格式）
  # 纯文字排版：血红色标题 + 黑色正文，无方块
  ban-message:
    - "<#8B0000><bold>哟，开挂被逮到了吧！</bold>"
    - ""
    - "<black>玩家 <white>%player%</white> 已被永久 <black><bold>BAN</bold><black> 咯~"
    - ""
    - "<black>原因: %reason%"
    - "<black>检测: %check% (VL:%vl%)"
    - ""
    - "<black>不会吧不会吧，真有人觉得不会被发现？"
    - "<black>建议: 卸载作弊器，重新做人。"
    - ""
    - "<black>不服？憋着。找管理哭唧唧"
    - ""
    - "<black>到期: %expiry%"
    - ""
    - "<black><hover:show_text:'点也没用，乖~'><click:open_url:'https://example.com'>[ 申诉入口（假的）]</click></hover>"

  # 踢出消息模板
  kick-message:
    - "<#8B0000><bold>嗖~ 的一下你就飞出去了！</bold>"
    - ""
    - "<black>玩家 <white>%player%</white> 已被一脚踢飞"
    - ""
    - "<black>原因: %reason%"
    - "<black>检测: %check% (VL:%vl%)"
    - ""
    - "<black>系统检测到你的操作太下饭了"
    - "<black>建议: 手残就练，别老想走捷径"
    - ""
    - "<black><hover:show_text:'再试试？我赌你还会触发'><click:open_url:'https://example.com'>[ 不服？点我 ]</click></hover>"

