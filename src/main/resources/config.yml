# ==========================================
# 认证模块
# ==========================================

auth:
  enabled: true
  login-timeout: 120
  same-ip-timeout: 5
  auto-kick: true
  restrict-movement: true
  restrict-interaction: true
  restrict-chat: true
  restrict-commands: true
  restrict-inventory: true
  restrict-items: true
  command-whitelist:
    - "^(login|l|register|reg|changepassword|changepwd|logout)(\\s+.*)?$"
  proxy:
    enabled: false
    type: auto
