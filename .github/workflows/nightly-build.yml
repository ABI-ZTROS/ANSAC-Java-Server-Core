name: Nightly Build

on:
  schedule:
    # Run at midnight UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  nightly-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Build with Gradle
      run: |
        chmod +x gradlew
        ./gradlew shadowJar --no-daemon

    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

    - name: Upload nightly build
      uses: actions/upload-artifact@v4
      with:
        name: ANSAC-Nightly-${{ steps.date.outputs.date }}
        path: build/libs/ANSAC-AntiCheat-*.jar
        retention-days: 7

    - name: Create nightly release
      if: github.ref == 'refs/heads/main'
      uses: ncipollo/release-action@v1
      with:
        tag: nightly-${{ steps.date.outputs.date }}
        name: Nightly Build ${{ steps.date.outputs.date }}
        body: |
          Automated nightly build of ANSAC Anti-Cheat.
          
          **Build Date:** ${{ steps.date.outputs.date }}
          **Commit:** ${{ github.sha }}
          
          This is an automated build and may contain unstable features.
        artifacts: build/libs/ANSAC-AntiCheat-*.jar
        allowUpdates: true
        prerelease: true
        token: ${{ secrets.GITHUB_TOKEN }}
