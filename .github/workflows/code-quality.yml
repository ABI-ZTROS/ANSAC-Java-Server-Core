name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  compile-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.5'

    - name: Clear corrupted dependency cache
      run: rm -rf $HOME/.gradle/caches/modules-2/files-2.1/com.tcoded/

    - name: Compile check
      run: gradle clean build --no-daemon

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ANSAC-Build
        path: build/libs/ANSAC-AntiCheat-*.jar
