name: Build & Release ANSAC

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.5'

    - name: Build with Gradle
      run: gradle build --no-daemon

    - name: Run tests
      run: gradle test --no-daemon
      continue-on-error: true

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ANSAC-Build
        path: build/libs/*.jar

  auto-release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.5'

    - name: Build release JAR
      run: gradle shadowJar --no-daemon

    - name: Get version
      id: version
      run: |
        SHORT_SHA=$(git rev-parse --short HEAD)
        BUILD_DATE=$(date +'%Y%m%d-%H%M')
        echo "tag=build-${BUILD_DATE}-${SHORT_SHA}" >> $GITHUB_OUTPUT
        echo "name=Build ${BUILD_DATE} (${SHORT_SHA})" >> $GITHUB_OUTPUT

    - name: Delete old auto-release
      run: |
        gh release list --json tagName,isPrerelease -q '.[] | select(.tagName | startswith("build-")) | .tagName' | while read tag; do
          echo "Deleting old release: $tag"
          gh release delete "$tag" --yes --cleanup-tag || true
        done
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create auto-release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: ${{ steps.version.outputs.name }}
        body: |
          ## ANSAC Auto-Build

          **Commit:** `${{ github.sha }}`
          **Branch:** `${{ github.ref_name }}`
          **Build Date:** $(date +'%Y-%m-%d %H:%M:%S UTC')

          > This is an automated pre-release build. Download `ANSAC-AntiCheat.jar` below.
        files: build/libs/ANSAC-AntiCheat-*.jar
        prerelease: true
        make_latest: false
        token: ${{ secrets.GITHUB_TOKEN }}

  official-release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.5'

    - name: Build release JAR
      run: gradle shadowJar --no-daemon

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: build/libs/ANSAC-AntiCheat-*.jar
        asset_name: ANSAC-AntiCheat.jar
        asset_content_type: application/java-archive
