name: Test on Folia Server

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  folia-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.5'

    - name: Clear corrupted dependency cache
      run: rm -rf $HOME/.gradle/caches/modules-2/files-2.1/com.tcoded/

    - name: Build plugin
      run: gradle fatJar --no-daemon

    - name: Download Folia 1.21.4
      run: |
        mkdir -p server
        cd server
        # Download Folia build matching the API version used in build.gradle (1.21.4)
        curl -o folia.jar -L \
          -H "User-Agent: ANSAC-CI/1.1.0 (https://github.com/ABI-ZTROS/ANSAC-Java-Server-Core)" \
          "https://api.papermc.io/v2/projects/folia/versions/1.21.4/builds/latest/downloads/folia-1.21.4.jar"
        ls -la

    - name: Setup test server
      run: |
        cd server
        echo "eula=true" > eula.txt
        mkdir -p plugins
        cp ../build/libs/ANSAC-AntiCheat-*.jar plugins/ANSAC-AntiCheat.jar

        # Create server.properties
        cat > server.properties << 'EOF'
        server-port=25565
        online-mode=false
        max-players=10
        motd=ANSAC Test Server
        enable-command-block=false
        gamemode=survival
        difficulty=normal
        spawn-protection=0
        view-distance=6
        simulation-distance=6
        EOF

        # Create Folia config
        mkdir -p config
        cat > config/folia-global.yml << 'EOF'
        region-thread-count: 4
        global-region-thread-count: 2
        EOF

    - name: Start Folia server (health check)
      run: |
        cd server
        timeout 60s java -Xmx2G -Xms2G \
          -XX:+UseG1GC \
          -XX:+ParallelRefProcEnabled \
          -XX:MaxGCPauseMillis=200 \
          -XX:+UnlockExperimentalVMOptions \
          -jar folia.jar nogui || true

        # Check if server started successfully
        if grep -q "Done" logs/latest.log 2>/dev/null; then
          echo "Server started successfully!"
          cat logs/latest.log | tail -20
        else
          echo "Server log:"
          cat logs/latest.log 2>/dev/null | tail -50 || echo "No log file found"
        fi

    - name: Check plugin loaded
      run: |
        cd server
        if grep -q "ANSAC has been enabled successfully" logs/latest.log 2>/dev/null; then
          echo "ANSAC plugin loaded successfully on Folia!"
        else
          echo "Warning: ANSAC plugin may not have loaded correctly"
          cat logs/latest.log 2>/dev/null | grep -i "ansac\|error\|warn" | tail -20 || true
        fi

    - name: Upload server logs
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: folia-server-logs
        path: server/logs/
