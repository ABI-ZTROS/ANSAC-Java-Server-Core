plugins {
    id 'java'
    id 'com.github.johnrengelman.shadow' version '8.1.1'
}

group = 'dev.ztros.ansac'
version = '1.0.0-SNAPSHOT'

description = 'ANSAC - Advanced Network Security Anti-Cheat for Folia'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

repositories {
    mavenCentral()
    maven { url = 'https://repo.papermc.io/repository/maven-public/' }
    maven { url = 'https://repo.codemc.io/repository/maven-public/' }
    maven { url = 'https://repo.nexomc.com/releases/' }
}

configurations {
    // Custom configuration for dependencies to be shaded into the JAR
    shade
    implementation.extendsFrom(shade)
}

dependencies {
    // Server API (provided at runtime)
    compileOnly 'dev.folia:folia-api:1.20.1-R0.1-SNAPSHOT'
    compileOnly 'com.github.retrooper:packetevents-api:2.7.0'
    compileOnly 'com.github.retrooper:packetevents-spigot:2.7.0'

    // FoliaLib - shaded into the plugin JAR via custom 'shade' configuration
    shade('com.tcoded:FoliaLib:0.4.3') {
        transitive = false
    }

    // Lombok - compile time only
    compileOnly 'org.projectlombok:lombok:1.18.30'
    annotationProcessor 'org.projectlombok:lombok:1.18.30'
}

shadowJar {
    archiveClassifier = ''
    archiveFileName = 'ANSAC-AntiCheat-' + project.version + '.jar'

    // Use the 'shade' configuration
    configurations = [project.configurations.shade]

    // Relocate FoliaLib to prevent conflicts
    relocate 'com.tcoded.folialib', 'dev.ztros.ansac.lib.folialib'

    // Merge service files
    mergeServiceFiles()
}

tasks.named('build') {
    dependsOn tasks.named('shadowJar')
}

tasks.named('compileJava') {
    options.encoding = 'UTF-8'
    options.release = 17
}
